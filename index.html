<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>RES Arıza Kaydı</title>
<meta name="theme-color" content="#14263B">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<style>
  :root{
    --lacivert:#14263B;
    --celik:#3E5871;
    --ruzgar:#1178A8;
    --ruzgar-acik:#E3F1F7;
    --zemin:#F2F4F6;
    --kart:#FFFFFF;
    --cizgi:#D8DEE4;
    --metin:#1C2733;
    --soluk:#68788A;
    --yesil:#1E7F4F;
    --kirmizi:#B4442E;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{
    font-family:-apple-system,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    background:var(--zemin);color:var(--metin);
    -webkit-font-smoothing:antialiased;
  }
  .sayfa{max-width:520px;margin:0 auto;padding-bottom:110px}

  /* ---------- Başlık ---------- */
  header{
    background:var(--lacivert);color:#fff;
    padding:20px 20px 18px;
    display:flex;align-items:center;gap:14px;
  }
  .logo-kutu{flex:none;background:#fff;border-radius:10px;width:54px;height:54px;
    display:flex;align-items:center;justify-content:center;padding:5px}
  .logo-kutu img{max-width:100%;max-height:100%;display:block}
  .eyebrow{font-size:11px;letter-spacing:.18em;text-transform:uppercase;color:#9DB4C8;margin-bottom:3px}
  h1{font-size:17px;font-weight:700;letter-spacing:-.01em;line-height:1.2}
  .alt-baslik{font-size:12px;color:#9DB4C8;margin-top:3px}

  /* ---------- Bölümler ---------- */
  .bolum{background:var(--kart);border:1px solid var(--cizgi);border-radius:12px;margin:14px 14px 0;padding:16px}
  label.baslik{display:block;font-size:12px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--celik);margin-bottom:10px}
  .zorunlu::after{content:" *";color:var(--kirmizi)}

  input[type=date],input[type=time],select,textarea,input[type=text]{
    width:100%;border:1.5px solid var(--cizgi);border-radius:10px;
    padding:13px 14px;font-size:16px;font-family:inherit;color:var(--metin);
    background:#fff;appearance:none;-webkit-appearance:none;
  }
  input:focus,select:focus,textarea:focus{outline:none;border-color:var(--ruzgar)}
  textarea{min-height:72px;resize:vertical}
  .satir2{display:flex;gap:10px}
  .satir2>div{flex:1}
  .alt-etiket{font-size:12px;color:var(--soluk);margin-bottom:6px}

  /* ---------- Arıza arama ---------- */
  .arama-kutu{position:relative}
  #arizaArama{padding-left:40px}
  .arama-ikon{position:absolute;left:13px;top:50%;transform:translateY(-50%);color:var(--soluk)}
  #sonuclar{
    margin-top:8px;border:1px solid var(--cizgi);border-radius:10px;
    max-height:240px;overflow-y:auto;display:none;background:#fff;
  }
  .sonuc{
    display:flex;gap:10px;align-items:baseline;
    padding:12px 14px;border-bottom:1px solid var(--zemin);cursor:pointer;
  }
  .sonuc:last-child{border-bottom:none}
  .sonuc:active{background:var(--ruzgar-acik)}
  .sonuc .kod{font-weight:800;color:var(--ruzgar);font-variant-numeric:tabular-nums;flex:none;min-width:34px}
  .sonuc .ad{font-size:14px;line-height:1.35}
  .bos-sonuc{padding:14px;font-size:14px;color:var(--soluk)}

  .secili-ariza{
    display:none;margin-top:10px;
    background:var(--ruzgar-acik);border:1.5px solid var(--ruzgar);
    border-radius:10px;padding:12px 14px;
    align-items:baseline;gap:10px;
  }
  .secili-ariza .kod{font-weight:800;color:var(--ruzgar);flex:none}
  .secili-ariza .ad{font-size:14px;flex:1;line-height:1.35}
  .secili-ariza button{
    flex:none;border:none;background:none;color:var(--celik);
    font-size:22px;line-height:1;padding:0 2px;cursor:pointer;align-self:center;
  }
  .diger-satir{margin-top:12px;display:flex;align-items:center;gap:8px;font-size:14px;color:var(--soluk)}
  .diger-satir input[type=checkbox]{width:20px;height:20px;accent-color:var(--ruzgar)}
  #digerAlan{display:none;margin-top:10px}

  /* ---------- Çipler ---------- */
  .cipler{display:flex;flex-wrap:wrap;gap:8px}
  .cip{
    border:1.5px solid var(--cizgi);border-radius:999px;background:#fff;
    padding:10px 15px;font-size:14px;font-family:inherit;color:var(--metin);cursor:pointer;
  }
  .cip.aktif{background:var(--lacivert);border-color:var(--lacivert);color:#fff}
  .hizli-cip{border-style:dashed;color:var(--celik)}
  .hizli-cip.aktif{background:var(--celik);border-color:var(--celik);border-style:solid;color:#fff}
  #ekPersonel{margin-top:10px}
  #personelSonuclar{margin-top:8px;border:1px solid var(--cizgi);border-radius:10px;
    max-height:220px;overflow-y:auto;display:none;background:#fff}
  .p-sonuc{padding:12px 14px;border-bottom:1px solid var(--zemin);cursor:pointer;font-size:15px}
  .p-sonuc:last-child{border-bottom:none}
  .p-sonuc:active{background:var(--ruzgar-acik)}
  .p-cip{display:inline-flex;align-items:center;gap:8px;
    background:var(--lacivert);color:#fff;border-radius:999px;
    padding:9px 10px 9px 15px;font-size:14px}
  .p-cip button{border:none;background:rgba(255,255,255,.18);color:#fff;
    width:22px;height:22px;border-radius:50%;font-size:14px;line-height:1;cursor:pointer}

  /* ---------- Gönder ---------- */
  .gonder-bar{
    position:fixed;bottom:0;left:0;right:0;
    background:linear-gradient(to top,var(--zemin) 65%,transparent);
    padding:18px 14px 20px;
  }
  .gonder-bar .ic{max-width:520px;margin:0 auto}
  #kaydetBtn{
    width:100%;border:none;border-radius:12px;
    background:var(--yesil);color:#fff;
    font-size:17px;font-weight:700;font-family:inherit;
    padding:16px;cursor:pointer;
  }
  #kaydetBtn:disabled{background:#9BB3A6}
  .hata{display:none;margin:12px 14px 0;background:#FBEAE5;border:1px solid var(--kirmizi);
    color:var(--kirmizi);border-radius:10px;padding:12px 14px;font-size:14px}

  /* ---------- Başarı ekranı ---------- */
  #basari{display:none;text-align:center;padding:70px 30px}
  #basari .halka{
    width:74px;height:74px;border-radius:50%;background:var(--yesil);
    color:#fff;font-size:36px;line-height:74px;margin:0 auto 18px;
  }
  #basari h2{font-size:20px;margin-bottom:8px}
  #basari p{color:var(--soluk);font-size:14px;margin-bottom:26px}
  #yeniKayit{
    border:1.5px solid var(--lacivert);background:#fff;color:var(--lacivert);
    border-radius:12px;padding:14px 30px;font-size:16px;font-weight:700;
    font-family:inherit;cursor:pointer;
  }
  @media (prefers-reduced-motion:no-preference){
    .sonuc,.cip,#kaydetBtn{transition:background .12s,border-color .12s,color .12s}
  }
</style>
</head>
<body>
<div class="sayfa">

  <header>
    <div class="logo-kutu"><img src="logo.png" alt="Rönesans Enerji"></div>
    <div>
      <div class="eyebrow">R. Enerji</div>
      <h1>Rüzgar Enerji Üretim</h1>
      <div class="alt-baslik">Arıza Müdahale Kaydı</div>
    </div>
  </header>

  <div id="form">

    <div class="bolum">
      <label class="baslik zorunlu" for="tarih">Tarih</label>
      <input type="date" id="tarih">
    </div>

    <div class="bolum">
      <label class="baslik zorunlu" for="turbin">Türbin No</label>
      <select id="turbin">
        <option value="">Türbin seçin…</option>
      </select>
    </div>

    <div class="bolum">
      <label class="baslik zorunlu" for="arizaArama">Arıza Türü</label>
      <div class="arama-kutu">
        <span class="arama-ikon">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
            <circle cx="7" cy="7" r="5" stroke="currentColor" stroke-width="1.8"/>
            <line x1="11" y1="11" x2="15" y2="15" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
          </svg>
        </span>
        <input type="text" id="arizaArama" inputmode="text"
               placeholder="Kod veya arıza adı yazın (örn. 242)" autocomplete="off">
      </div>
      <div id="sonuclar"></div>
      <div class="secili-ariza" id="seciliAriza">
        <span class="kod" id="seciliKod"></span>
        <span class="ad" id="seciliAd"></span>
        <button type="button" id="temizleBtn" aria-label="Seçimi kaldır">&times;</button>
      </div>
      <div class="diger-satir">
        <input type="checkbox" id="digerCheck">
        <label for="digerCheck">Listede yok / diğer arıza</label>
      </div>
      <div id="digerAlan">
        <input type="text" id="arizaDiger" placeholder="Arızayı kısaca yazın">
      </div>
    </div>

    <div class="bolum">
      <label class="baslik" for="aciklama">Açıklama</label>
      <div class="cipler" style="margin-bottom:10px">
        <button type="button" class="cip hizli-cip" data-metin="Arıza Giderildi">Arıza Giderildi</button>
        <button type="button" class="cip hizli-cip" data-metin="Eksik Parça Olduğundan Dolayı Çalışma Tamamlanamadı">Parça Eksik</button>
        <button type="button" class="cip hizli-cip" data-metin="Sorun Halledilmedi, Yarın Tekrar Gidilecek">Yarın Tekrar</button>
        <button type="button" class="cip hizli-cip" data-metin="Hava Muhalefeti Nedeni ile Çalışma Yapılamadı">Hava Koşulları</button>
      </div>
      <textarea id="aciklama" placeholder="Not ekleyin (isteğe bağlı)"></textarea>
    </div>

    <div class="bolum">
      <label class="baslik zorunlu">Müdahale Eden Kişiler</label>
      <div class="cipler" id="personelSecili" style="margin-bottom:10px"></div>
      <div class="arama-kutu">
        <span class="arama-ikon">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
            <circle cx="7" cy="7" r="5" stroke="currentColor" stroke-width="1.8"/>
            <line x1="11" y1="11" x2="15" y2="15" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
          </svg>
        </span>
        <input type="text" id="personelArama" placeholder="    İsim yazın, listeden seçin" autocomplete="off">
      </div>
      <div id="personelSonuclar"></div>
      <input type="text" id="ekPersonel" placeholder="Listede olmayan kişi (isteğe bağlı)" style="margin-top:10px">
    </div>

    <div class="bolum">
      <label class="baslik zorunlu">Müdahale Saatleri</label>
      <div class="satir2">
        <div>
          <div class="alt-etiket">Başlangıç</div>
          <input type="time" id="baslangic">
        </div>
        <div>
          <div class="alt-etiket">Bitiş</div>
          <input type="time" id="bitis">
        </div>
      </div>
    </div>

    <div class="hata" id="hataKutu"></div>
  </div>

  <div id="basari">
    <div class="halka">&#10003;</div>
    <h2>Kayıt alındı</h2>
    <p id="basariDetay"></p>
    <button type="button" id="yeniKayit">Yeni Kayıt Gir</button>
  </div>

</div>

<div class="gonder-bar" id="gonderBar">
  <div class="ic">
    <button type="button" id="kaydetBtn">Kaydı Gönder</button>
  </div>
</div>

// Bugünün tarihi
(function(){

// Türbin listesi T01–T54
(function(){
  var sel = document.getElementById("turbin");
  for (var i=1;i<=54;i++){
    var t = "T"+String(i).padStart(2,"0");
    var op = document.createElement("option");
    op.value = t; op.textContent = t;
    sel.appendChild(op);
  }

// Personel: aranabilir seçim
var seciliPersonel = [];
var pArama = document.getElementById("personelArama");
var pSonuc = document.getElementById("personelSonuclar");

function personelCiz(){
  var kap = document.getElementById("personelSecili");
  kap.innerHTML = "";
  seciliPersonel.forEach(function(ad, i){
    var c = document.createElement("span");
    c.className = "p-cip";
    c.innerHTML = ad + ' <button type="button" aria-label="Kaldır">&times;</button>';
    c.querySelector("button").addEventListener("click", function(){
      seciliPersonel.splice(i,1); personelCiz();
    });
    kap.appendChild(c);
  });
}

function personelListele(q){
  var esles = PERSONEL.filter(function(ad){
    return seciliPersonel.indexOf(ad) === -1 &&
           (!q || ad.toLocaleLowerCase("tr").indexOf(q) !== -1);
  });
  pSonuc.innerHTML = "";
  if (!esles.length){ pSonuc.style.display = "none"; return; }
  esles.forEach(function(ad){
    var d = document.createElement("div");
    d.className = "p-sonuc"; d.textContent = ad;
    d.addEventListener("click", function(){
      seciliPersonel.push(ad); personelCiz();
      pArama.value = ""; pSonuc.style.display = "none";
      pArama.focus();
    });
    pSonuc.appendChild(d);
  });
  pSonuc.style.display = "block";
}

pArama.addEventListener("input", function(){
  personelListele(pArama.value.trim().toLocaleLowerCase("tr"));
});
pArama.addEventListener("focus", function(){
  personelListele(pArama.value.trim().toLocaleLowerCase("tr"));
});
document.addEventListener("click", function(e){
  if (!pSonuc.contains(e.target) && e.target !== pArama) pSonuc.style.display = "none";
});

// Açıklama hızlı çipleri
document.querySelectorAll(".hizli-cip").forEach(function(c){
  c.addEventListener("click", function(){
    document.querySelectorAll(".hizli-cip").forEach(function(x){ if(x!==c) x.classList.remove("aktif"); });
    c.classList.toggle("aktif");
    document.getElementById("aciklama").value = c.classList.contains("aktif") ? c.dataset.metin : "";
  });
});

/* ============ Arıza arama ============ */
var seciliAriza = null;
var aramaInput = document.getElementById("arizaArama");
var sonucKutu = document.getElementById("sonuclar");

aramaInput.addEventListener("input", function(){
  var q = aramaInput.value.trim().toLocaleLowerCase("tr");
  if (!q){ sonucKutu.style.display="none"; sonucKutu.innerHTML=""; return; }
  var esles = ARIZALAR.filter(function(a){
    return a.k.indexOf(q) === 0 || a.t.toLocaleLowerCase("tr").indexOf(q) !== -1;
  }).slice(0, 30);
  sonucKutu.innerHTML = "";
  if (!esles.length){
    sonucKutu.innerHTML = '<div class="bos-sonuc">Eşleşen kod yok. "Listede yok / diğer arıza" seçeneğini kullanabilirsiniz.</div>';
  } else {
    esles.forEach(function(a){
      var d = document.createElement("div");
      d.className = "sonuc";
      d.innerHTML = '<span class="kod">'+a.k+'</span><span class="ad">'+a.t+'</span>';
      d.addEventListener("click", function(){ arizaSec(a); });
      sonucKutu.appendChild(d);
    });
  }
  sonucKutu.style.display = "block";
});

function arizaSec(a){
  seciliAriza = a;
  document.getElementById("seciliKod").textContent = a.k;
  document.getElementById("seciliAd").textContent = a.t;
  document.getElementById("seciliAriza").style.display = "flex";
  aramaInput.value = "";
  sonucKutu.style.display = "none";
}

document.getElementById("temizleBtn").addEventListener("click", function(){
  seciliAriza = null;
  document.getElementById("seciliAriza").style.display = "none";
});

// "Diğer" alanı
document.getElementById("digerCheck").addEventListener("change", function(e){
  document.getElementById("digerAlan").style.display = e.target.checked ? "block" : "none";
});

function hata(msj){
  var k = document.getElementById("hataKutu");
  k.textContent = msj; k.style.display = "block";
  k.scrollIntoView({behavior:"smooth", block:"center"});
}

document.getElementById("kaydetBtn").addEventListener("click", function(){
  document.getElementById("hataKutu").style.display = "none";

  var tarihISO = document.getElementById("tarih").value;
  var turbin = document.getElementById("turbin").value;
  var digerAktif = document.getElementById("digerCheck").checked;
  var digerMetin = document.getElementById("arizaDiger").value.trim();
  var bas = document.getElementById("baslangic").value;
  var bit = document.getElementById("bitis").value;

  var kisiler = seciliPersonel.slice();
  var ek = document.getElementById("ekPersonel").value.trim();
  if (ek) kisiler.push(ek);

  if (!tarihISO) return hata("Tarih seçin.");
  if (!turbin) return hata("Türbin seçin.");
  if (!seciliAriza && !(digerAktif && digerMetin)) return hata("Arıza türü seçin veya 'diğer' alanına yazın.");
  if (!kisiler.length) return hata("En az bir müdahale eden kişi seçin.");
  if (!bas || !bit) return hata("Başlangıç ve bitiş saatlerini girin.");

  // Tarih: GG.AA.YYYY formatına çevir (sheet TR yerel ayarı)
  var p = tarihISO.split("-");
  var tarihTR = p[2]+"."+p[1]+"."+p[0];

  var veri = {
    tarih: tarihTR,
    turbin: turbin,
    arizaTuru: seciliAriza ? (seciliAriza.k + " - " + seciliAriza.t) : "Diğer",
    arizaDiger: digerAktif ? digerMetin : "",
    aciklama: document.getElementById("aciklama").value.trim(),
    personel: kisiler.join(", "),
    baslangic: bas,
    bitis: bit
  };

  var btn = document.getElementById("kaydetBtn");

  if (!navigator.onLine){

  btn.disabled = true; btn.textContent = "Gönderiliyor…";

  // Google Form gönderim adresi
  var FORM_URL = "https://docs.google.com/forms/d/e/1FAIpQLSe1MmVf6eMDwWPPEMOGtURmG7b8fUwSxohICGBwk-UtF0qdLg/formResponse";

  // Tarih ve saatler Google Form'a parçalanmış formatta gider

  var bs = bas.split(":");      // [saat, dakika]
  var bt = bit.split(":");

  var p = new URLSearchParams();
  p.append("entry.1868723135_year",  tp[0]);
  p.append("entry.1868723135_month", tp[1]);
  p.append("entry.1868723135_day",   tp[2]);

  p.append("entry.982024261_hour",   bt[0]);
  p.append("entry.982024261_minute", bt[1]);

  fetch(FORM_URL, {

      turbin + " · " + veri.arizaTuru + " · " + bas + "–" + bit;
    document.getElementById("basari").style.display = "block";
    window.scrollTo(0,0);
  }).catch(function(){
    btn.disabled = false; btn.textContent = "Kaydı Gönder";
    hata("Kayıt gönderilemedi. Bağlantıyı kontrol edip tekrar deneyin.");
  });
});
